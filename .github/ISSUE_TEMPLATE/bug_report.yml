name: Bug report
description: Report a reproducible problem
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please do not paste API keys, auth tokens, cookies, or private session contents.
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `cpm --version` if available, or commit SHA.
      placeholder: "0.1.0"
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include the command or TUI path.
      placeholder: |
        1. Run ...
        2. Select ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs or screenshots
      description: Redact secrets before posting.
      render: text
